<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>RELINK — Closed</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #080b11;
      color: #e2eaf5;
      font-family: 'Outfit', sans-serif;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Subtle background glow */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 30% 50%, rgba(14,165,160,0.07) 0%, transparent 60%),
        radial-gradient(ellipse at 70% 40%, rgba(14,165,160,0.04) 0%, transparent 55%);
      pointer-events: none;
    }

    .card {
      text-align: center;
      max-width: 520px;
      padding: 0 24px;
      animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .logo {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: #0ea5a0;
      margin-bottom: 32px;
      opacity: 0;
      animation: fadeUp 0.6s 0.1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .icon {
      font-size: 52px;
      margin-bottom: 24px;
      display: block;
      opacity: 0;
      animation: fadeUp 0.6s 0.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    h1 {
      font-size: clamp(28px, 6vw, 42px);
      font-weight: 900;
      line-height: 1.15;
      letter-spacing: -0.02em;
      margin-bottom: 20px;
      opacity: 0;
      animation: fadeUp 0.6s 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    h1 span {
      color: #0ea5a0;
    }

    p {
      font-size: 16px;
      line-height: 1.7;
      color: #5a7290;
      max-width: 420px;
      margin: 0 auto;
      opacity: 0;
      animation: fadeUp 0.6s 0.45s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .divider {
      width: 40px;
      height: 2px;
      background: #0ea5a0;
      margin: 28px auto;
      border-radius: 2px;
      opacity: 0;
      animation: fadeUp 0.6s 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">RELINK</div>
    <span class="icon">🔒</span>
    <h1><span>Closed.</span></h1>
    <div class="divider"></div>
    <p>Thank you for the day and ¾ of fun.<br>Y'all can't keep your mouths shut and the school found out.</p>
  </div>
</body>
</html>
