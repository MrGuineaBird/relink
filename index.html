<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>RELINK</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    :root {
      --bg: #0e1621;
      --muted: #1b2838;
      --panel: #22324a;
      --accent: #2d4a7c;
      --accent-hover: #3a5d99;
      --text: #e0e6ed;
      --text-muted: #9fb3d1;
    }

    html,body {
      height: 100%;
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, system-ui, Segoe UI, Roboto, Arial;
    }
    .app { display:flex; height:100vh }

    /* Sidebar */
    .servers { width:72px; background:var(--muted); display:flex; flex-direction:column; align-items:center; padding:10px; gap:8px }
    .server-btn { width:48px; height:48px; border-radius:16px; background:var(--panel); display:flex; align-items:center; justify-content:center; font-weight:700; cursor:pointer; color:var(--text); transition:background .2s, transform .1s }
    .server-btn:hover { background:var(--accent-hover); transform:scale(1.05) }
    .server-btn.active { background:var(--accent); box-shadow:0 0 8px var(--accent) }
    .server-btn.create { background:transparent; border:2px dashed #444 }

    /* Channels panel */
    .server-panel { width:260px; background:var(--muted); display:flex; flex-direction:column }
    .server-header { padding:12px; font-weight:700; border-bottom:1px solid #242629; display:flex; justify-content:space-between; align-items:center }
    .channel-list { flex:1; overflow:auto; padding:6px }
    .channel-item { padding:8px 10px; border-radius:6px; cursor:pointer; color:var(--text-muted); transition:background .2s }
    .channel-item:hover { background:rgba(255,255,255,0.08) }
    .channel-item.active { background:var(--accent); color:#fff; font-weight:600 }
    .channel-actions { padding:8px; border-top:1px solid #242629; display:flex; gap:6px; flex-wrap:wrap }
    .btn { background:var(--accent); border:none; color:white; padding:8px 10px; border-radius:6px; cursor:pointer; transition:background .2s; font-size:13px }
    .btn:hover { background:var(--accent-hover) }
    .btn.danger { background:#7c2d2d }
    .btn.danger:hover { background:#993a3a }

    /* Chat */
    .chat { flex:1; display:flex; flex-direction:column }
    .chat-header { background:var(--panel); padding:12px; border-bottom:1px solid #242629; font-weight:700 }
    .messages { flex:1; padding:16px; overflow:auto; background:var(--bg) }
    .message { margin-bottom:12px; padding:6px 8px; border-radius:6px; background:rgba(255,255,255,0.03) }
    .message.self { background:rgba(45,74,124,0.3); text-align:right }
    .message .meta { font-size:12px; color:var(--text-muted); margin-bottom:4px }

    /* Input composer */
    .composer { display:flex; padding:12px; background:var(--panel); gap:8px; border-top:1px solid #242629 }
    .input { flex:1; padding:10px; border-radius:8px; border:none; background:#0b0c0d; color:var(--text) }
    #sendBtn { padding:0 16px; border-radius:6px; background:var(--accent); border:none; color:white; cursor:pointer; transition:background .2s }
    #sendBtn:hover { background:var(--accent-hover) }

    /* Right panel */
    .right { width:200px; background:var(--muted); padding:12px; border-left:1px solid #242629 }
    .right ul { list-style:none; padding:0; margin:4px 0 }
    .right li { padding:4px 0; font-size:13px }
    .small { font-size:12px; color:var(--text-muted) }

    /* Login screen */
    #loginScreen { display:flex; align-items:center; justify-content:center; height:100vh; background:var(--bg) }
    .login-box { background:var(--muted); padding:40px; border-radius:12px; box-shadow:0 0 20px rgba(0,0,0,0.4); text-align:center; width:300px }
    .login-box h1 { margin:0 0 6px 0 }
    .login-box p { margin:0 0 20px 0; color:var(--text-muted); font-size:13px }
    .login-box input { display:block; width:100%; margin-bottom:12px; padding:10px; border-radius:6px; border:none; background:#0b0c0d; color:var(--text); box-sizing:border-box }
    .login-actions { display:flex; gap:10px; justify-content:center }
    .login-actions button { flex:1; padding:10px; border-radius:6px; border:none; background:var(--accent); color:white; cursor:pointer; transition:background .2s }
    .login-actions button:hover { background:var(--accent-hover) }
    #loginError { color:#e07070; font-size:13px; margin-top:10px; min-height:18px }

    /* Invite badge */
    .invite-badge { font-size:11px; background:var(--panel); padding:2px 6px; border-radius:4px; color:var(--text-muted); cursor:pointer; margin-left:4px }
    .invite-badge:hover { background:var(--accent) }

    /* Modal overlay */
    .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:100; align-items:center; justify-content:center }
    .modal-overlay.open { display:flex }
    .modal { background:var(--muted); border-radius:14px; padding:32px; width:360px; box-shadow:0 8px 40px rgba(0,0,0,0.5); position:relative }
    .modal h2 { margin:0 0 20px 0; font-size:18px }
    .modal-tabs { display:flex; gap:8px; margin-bottom:24px }
    .modal-tab { flex:1; padding:8px; border-radius:8px; border:none; background:var(--panel); color:var(--text-muted); cursor:pointer; font-size:13px; transition:background .2s }
    .modal-tab.active { background:var(--accent); color:#fff; font-weight:600 }
    .modal-section { display:none }
    .modal-section.active { display:block }
    .modal label { display:block; font-size:12px; color:var(--text-muted); margin-bottom:6px }
    .modal input[type=text] { display:block; width:100%; padding:10px; border-radius:8px; border:none; background:#0b0c0d; color:var(--text); box-sizing:border-box; margin-bottom:16px; font-size:14px }
    .modal input[type=text]:focus { outline:2px solid var(--accent) }

    /* Avatar upload area */
    .avatar-upload { display:flex; align-items:center; gap:16px; margin-bottom:20px }
    .avatar-preview { width:72px; height:72px; border-radius:16px; background:var(--panel); display:flex; align-items:center; justify-content:center; font-size:28px; font-weight:700; color:var(--text-muted); overflow:hidden; flex-shrink:0; cursor:pointer; border:2px dashed #444; transition:border-color .2s }
    .avatar-preview:hover { border-color:var(--accent) }
    .avatar-preview img { width:100%; height:100%; object-fit:cover }
    .avatar-upload-info { font-size:12px; color:var(--text-muted); line-height:1.6 }
    .avatar-upload-info span { color:var(--accent); cursor:pointer }
    .avatar-upload-info span:hover { text-decoration:underline }
    .modal-error { color:#e07070; font-size:12px; margin-bottom:12px; min-height:16px }
    .modal-actions { display:flex; gap:10px; justify-content:flex-end }
    .modal-actions button { padding:9px 20px; border-radius:8px; border:none; cursor:pointer; font-size:14px; transition:background .2s }
    .modal-cancel { background:var(--panel); color:var(--text-muted) }
    .modal-cancel:hover { background:#2e3d52 }
    .modal-confirm { background:var(--accent); color:#fff; font-weight:600 }
    .modal-confirm:hover { background:var(--accent-hover) }
    .modal-close { position:absolute; top:14px; right:16px; background:none; border:none; color:var(--text-muted); font-size:20px; cursor:pointer; line-height:1 }
    .modal-close:hover { color:var(--text) }

    /* Server btn with avatar image */
    .server-btn img { width:100%; height:100%; object-fit:cover; border-radius:14px }
  </style>
</head>
<body>

<!-- Login Screen -->
<div id="loginScreen">
  <div class="login-box">
    <h1>RELINK</h1>
    <p>Username-based chat</p>
    <input id="usernameInput" type="text" placeholder="Username (letters, numbers, _)" autocomplete="off">
    <input id="passwordInput" type="password" placeholder="Password">
    <div class="login-actions">
      <button id="loginBtn">Login</button>
      <button id="signupBtn">Sign Up</button>
    </div>
    <div id="loginError"></div>
  </div>
</div>

<!-- Main App (hidden until login) -->
<div class="app" id="app" style="display:none;">
  <div class="servers" id="serversCol">
    <div class="server-btn" id="homeBtn" title="Direct Messages">R</div>
    <div class="server-btn create" id="createServerBtn" title="Create or Join Server">+</div>
  </div>

  <div class="server-panel" id="serverPanel">
    <div class="server-header">
      <span id="serverHeader">No server</span>
      <span id="inviteBadge" class="invite-badge" title="Copy invite code" style="display:none">📋 invite</span>
    </div>
    <div class="channel-list" id="channelList"></div>
    <div class="channel-actions">
      <button class="btn" id="addChannelBtn">+ Channel</button>
      <button class="btn danger" id="logoutBtn">Logout</button>
    </div>
  </div>

  <div class="chat">
    <div class="chat-header" id="chatHeader"># none</div>
    <div class="messages" id="messages"></div>
    <div class="composer">
      <input id="inputMsg" class="input" placeholder="Message…" />
      <button class="btn" id="sendBtn">Send</button>
    </div>
  </div>

  <div class="right">
    <div class="small">Online in channel</div>
    <ul id="onlineList"></ul>
    <hr style="border:none;height:1px;background:#242629;margin:8px 0">
    <div class="small">My Account</div>
    <div id="myUsername" style="font-size:13px;margin-top:4px"></div>
  </div>
</div>


<!-- Server Create/Join Modal -->
<div class="modal-overlay" id="serverModal">
  <div class="modal">
    <button class="modal-close" id="modalClose">×</button>
    <h2 id="modalTitle">Add a Server</h2>
    <div class="modal-tabs">
      <button class="modal-tab active" id="tabCreate">Create New</button>
      <button class="modal-tab" id="tabJoin">Join with Code</button>
    </div>

    <!-- Create section -->
    <div class="modal-section active" id="sectionCreate">
      <div class="avatar-upload">
        <div class="avatar-preview" id="avatarPreview" title="Click to upload image">
          <span id="avatarPlaceholder">?</span>
        </div>
        <div class="avatar-upload-info">
          <strong>Server Icon</strong><br>
          <span id="avatarUploadTrigger">Click to upload</span><br>
          PNG, JPG, GIF · Max 2 MB
        </div>
      </div>
      <input type="file" id="avatarFileInput" accept="image/*" style="display:none">
      <label for="serverNameInput">Server Name</label>
      <input type="text" id="serverNameInput" placeholder="My Awesome Server" maxlength="48">
      <div class="modal-error" id="createError"></div>
      <div class="modal-actions">
        <button class="modal-cancel" id="createCancel">Cancel</button>
        <button class="modal-confirm" id="createConfirm">Create Server</button>
      </div>
    </div>

    <!-- Join section -->
    <div class="modal-section" id="sectionJoin">
      <label for="inviteCodeInput">Invite Code</label>
      <input type="text" id="inviteCodeInput" placeholder="e.g. A3BX92KQ" maxlength="16" style="text-transform:uppercase">
      <div class="modal-error" id="joinError"></div>
      <div class="modal-actions">
        <button class="modal-cancel" id="joinCancel">Cancel</button>
        <button class="modal-confirm" id="joinConfirm">Join Server</button>
      </div>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp }                              from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword,
         signInWithEmailAndPassword, signOut,
         onAuthStateChanged }                         from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
import { getFirestore, collection, doc, addDoc,
         getDoc, getDocs, setDoc, updateDoc, deleteDoc,
         query, where, orderBy, limitToLast,
         onSnapshot, serverTimestamp, arrayUnion }    from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey:            "AIzaSyCT_MJarWSBiVgKtrqv6VjRcHmwb42it7s",
  authDomain:        "relink-fbfa5.firebaseapp.com",
  projectId:         "relink-fbfa5",
  storageBucket:     "relink-fbfa5.firebasestorage.app",
  messagingSenderId: "37286525064",
  appId:             "1:37286525064:web:ca6e0cf7c1d03c9a8b073d"
};

const app  = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db   = getFirestore(app);

// ── State ──────────────────────────────────────────────────────────
let currentUser    = null;
let myUsername     = null;
let currentServer  = null;
let currentChannel = null;
let currentInvite  = null;
let inDM           = false;
let currentDMUid   = null;
let currentDMName  = null;
let unsubMessages  = null;
let unsubPresence  = null;

// ── DOM refs ───────────────────────────────────────────────────────
const serverHeader = document.getElementById('serverHeader');
const chatHeader   = document.getElementById('chatHeader');
const channelList  = document.getElementById('channelList');
const messagesBox  = document.getElementById('messages');
const onlineList   = document.getElementById('onlineList');
const inviteBadge  = document.getElementById('inviteBadge');
const loginError   = document.getElementById('loginError');


// ══════════════════════════════════════════════════════════════════
//  AUTH
// ══════════════════════════════════════════════════════════════════

function usernameToEmail(u) { return u.toLowerCase() + '@relink.local'; }

async function signup() {
  const u = document.getElementById('usernameInput').value.trim();
  const p = document.getElementById('passwordInput').value;
  loginError.textContent = '';
  if (!u || !p) return (loginError.textContent = 'Enter a username and password.');
  if (!/^[a-zA-Z0-9_]{2,24}$/.test(u))
    return (loginError.textContent = 'Username: 2-24 chars, letters/numbers/_ only.');
  try {
    const cred = await createUserWithEmailAndPassword(auth, usernameToEmail(u), p);
    try { await setDoc(doc(db, 'users', cred.user.uid), { username: u, uid: cred.user.uid }); } catch (_) {}
  } catch (e) {
    loginError.textContent = e.code === 'auth/email-already-in-use' ? 'Username already taken.' : e.message;
  }
}

async function login() {
  const u = document.getElementById('usernameInput').value.trim();
  const p = document.getElementById('passwordInput').value;
  loginError.textContent = '';
  if (!u || !p) return (loginError.textContent = 'Enter a username and password.');
  try {
    await signInWithEmailAndPassword(auth, usernameToEmail(u), p);
  } catch (e) {
    loginError.textContent = 'Login failed — check your username and password.';
  }
}

async function logout() {
  await clearPresence();
  await signOut(auth);
}

onAuthStateChanged(auth, async user => {
  if (user) {
    currentUser = user;
    const snap = await getDoc(doc(db, 'users', user.uid));
    myUsername = snap.exists() ? snap.data().username : user.email;
    document.getElementById('myUsername').textContent = '@' + myUsername;
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    await loadMyServers();
    await loadDMList();
  } else {
    currentUser = null;
    myUsername  = null;
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('app').style.display = 'none';
    if (unsubMessages) { unsubMessages(); unsubMessages = null; }
    if (unsubPresence) { unsubPresence(); unsubPresence = null; }
  }
});

document.getElementById('logoutBtn').onclick = logout;


// ══════════════════════════════════════════════════════════════════
//  SERVERS
// ══════════════════════════════════════════════════════════════════

function randomInvite() { return Math.random().toString(36).slice(2, 10).toUpperCase(); }

// ── Modal state ────────────────────────────────────────────────────
let pendingAvatarB64 = null;

function openServerModal() {
  pendingAvatarB64 = null;
  document.getElementById('avatarPreview').innerHTML = '<span id="avatarPlaceholder">?</span>';
  document.getElementById('serverNameInput').value = '';
  document.getElementById('inviteCodeInput').value = '';
  document.getElementById('createError').textContent = '';
  document.getElementById('joinError').textContent = '';
  switchModalTab('create');
  document.getElementById('serverModal').classList.add('open');
}

function closeServerModal() {
  document.getElementById('serverModal').classList.remove('open');
  pendingAvatarB64 = null;
}

function switchModalTab(tab) {
  document.getElementById('tabCreate').classList.toggle('active', tab === 'create');
  document.getElementById('tabJoin').classList.toggle('active', tab === 'join');
  document.getElementById('sectionCreate').classList.toggle('active', tab === 'create');
  document.getElementById('sectionJoin').classList.toggle('active', tab === 'join');
}

// Avatar upload
document.getElementById('avatarPreview').addEventListener('click', () => document.getElementById('avatarFileInput').click());
document.getElementById('avatarUploadTrigger').addEventListener('click', () => document.getElementById('avatarFileInput').click());
document.getElementById('avatarFileInput').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  if (file.size > 2 * 1024 * 1024) {
    document.getElementById('createError').textContent = 'Image too large — max 2 MB.';
    return;
  }
  document.getElementById('createError').textContent = '';
  const reader = new FileReader();
  reader.onload = ev => {
    pendingAvatarB64 = ev.target.result; // full data URL
    const preview = document.getElementById('avatarPreview');
    preview.innerHTML = `<img src="${pendingAvatarB64}" alt="avatar">`;
  };
  reader.readAsDataURL(file);
});

// Tab switching
document.getElementById('tabCreate').addEventListener('click', () => switchModalTab('create'));
document.getElementById('tabJoin').addEventListener('click', () => switchModalTab('join'));

// Close buttons
document.getElementById('modalClose').addEventListener('click', closeServerModal);
document.getElementById('createCancel').addEventListener('click', closeServerModal);
document.getElementById('joinCancel').addEventListener('click', closeServerModal);

// Close on overlay click
document.getElementById('serverModal').addEventListener('click', e => {
  if (e.target === document.getElementById('serverModal')) closeServerModal();
});

// Create server confirm
document.getElementById('createConfirm').addEventListener('click', async () => {
  const name = document.getElementById('serverNameInput').value.trim();
  if (!name) return (document.getElementById('createError').textContent = 'Please enter a server name.');
  const invite = randomInvite();
  const ref = await addDoc(collection(db, 'servers'), {
    name, invite,
    icon: pendingAvatarB64 || null,
    ownerUid: currentUser.uid,
    members: [currentUser.uid],
    createdAt: serverTimestamp()
  });
  closeServerModal();
  await loadMyServers();
  selectServer(ref.id);
  // Show invite in a nicer way
  setTimeout(() => alert(`Server "${name}" created!\nInvite code: ${invite}`), 100);
});

// Join server confirm
document.getElementById('joinConfirm').addEventListener('click', async () => {
  const code = document.getElementById('inviteCodeInput').value.trim().toUpperCase();
  if (!code) return (document.getElementById('joinError').textContent = 'Please enter an invite code.');
  const snap = await getDocs(query(collection(db, 'servers'), where('invite', '==', code)));
  if (snap.empty) return (document.getElementById('joinError').textContent = 'Invite code not found.');
  const serverDoc = snap.docs[0];
  const data = serverDoc.data();
  if (data.members.includes(currentUser.uid)) {
    closeServerModal();
    selectServer(serverDoc.id);
    return;
  }
  await updateDoc(doc(db, 'servers', serverDoc.id), { members: arrayUnion(currentUser.uid) });
  closeServerModal();
  await loadMyServers();
  selectServer(serverDoc.id);
});

function createOrJoinServer() { openServerModal(); }

async function loadMyServers() {
  if (!currentUser) return;
  const snap = await getDocs(query(collection(db, 'servers'), where('members', 'array-contains', currentUser.uid)));

  const col = document.getElementById('serversCol');
  col.innerHTML = '';

  const homeBtn = document.createElement('div');
  homeBtn.className = 'server-btn';
  homeBtn.textContent = 'R';
  homeBtn.title = 'Direct Messages';
  homeBtn.onclick = loadDMList;
  col.appendChild(homeBtn);

  snap.docs.forEach(d => {
    const s = d.data();
    const btn = document.createElement('div');
    btn.className = 'server-btn' + (d.id === currentServer ? ' active' : '');
    btn.title = s.name;
    if (s.icon) {
      btn.innerHTML = `<img src="${s.icon}" alt="${s.name}">`;
    } else {
      btn.textContent = s.name[0].toUpperCase();
    }
    btn.onclick = () => selectServer(d.id);
    col.appendChild(btn);
  });

  const addBtn = document.createElement('div');
  addBtn.className = 'server-btn create';
  addBtn.textContent = '+';
  addBtn.title = 'Create or Join Server';
  addBtn.onclick = createOrJoinServer;
  col.appendChild(addBtn);
}

async function selectServer(serverId) {
  inDM = false;
  currentServer  = serverId;
  currentChannel = null;
  currentDMUid   = null;
  stopListeners();

  const serverSnap = await getDoc(doc(db, 'servers', serverId));
  const serverData = serverSnap.data();
  serverHeader.textContent = serverData.name;
  currentInvite = serverData.invite;
  inviteBadge.style.display = 'inline';
  inviteBadge.title = 'Invite code: ' + currentInvite + ' (click to copy)';

  chatHeader.textContent = '# none';
  channelList.innerHTML = '';
  messagesBox.innerHTML = '';
  onlineList.innerHTML  = '';
  document.getElementById('addChannelBtn').style.display = 'inline-block';

  const chSnap = await getDocs(query(collection(db, 'servers', serverId, 'channels'), orderBy('createdAt')));

  if (chSnap.empty) {
    await setDoc(doc(db, 'servers', serverId, 'channels', 'general'), { name: 'general', createdAt: serverTimestamp() });
    selectServer(serverId);
    return;
  }

  chSnap.docs.forEach(d => addChannelItem(d.data().name));
  joinChannel(chSnap.docs[0].data().name);
  loadMyServers();
}

function addChannelItem(name) {
  const el = document.createElement('div');
  el.className = 'channel-item' + (name === currentChannel ? ' active' : '');
  el.textContent = '# ' + name;
  el.onclick = () => joinChannel(name);
  channelList.appendChild(el);
}

async function addChannel() {
  if (!currentServer) return alert('Select a server first.');
  const name = prompt('Channel name (no #):');
  if (!name) return;
  const clean = name.trim().toLowerCase().replace(/\s+/g, '-');
  await setDoc(doc(db, 'servers', currentServer, 'channels', clean), { name: clean, createdAt: serverTimestamp() });
  addChannelItem(clean);
  joinChannel(clean);
}

document.getElementById('addChannelBtn').onclick = addChannel;
document.getElementById('createServerBtn').onclick = createOrJoinServer;
document.getElementById('homeBtn').onclick = loadDMList;

inviteBadge.onclick = () => {
  if (!currentInvite) return;
  navigator.clipboard.writeText(currentInvite).then(() => alert('Invite code copied: ' + currentInvite));
};


// ══════════════════════════════════════════════════════════════════
//  CHANNELS & REAL-TIME MESSAGES
// ══════════════════════════════════════════════════════════════════

function stopListeners() {
  if (unsubMessages) { unsubMessages(); unsubMessages = null; }
  if (unsubPresence) { unsubPresence(); unsubPresence = null; }
}

function joinChannel(ch) {
  stopListeners();
  inDM = false;
  currentChannel = ch;
  chatHeader.textContent = '# ' + ch;
  messagesBox.innerHTML  = '';
  onlineList.innerHTML   = '';

  Array.from(channelList.children).forEach(el => {
    el.classList.toggle('active', el.textContent === '# ' + ch);
  });

  const msgsQ = query(
    collection(db, 'servers', currentServer, 'channels', ch, 'messages'),
    orderBy('ts'), limitToLast(100)
  );
  unsubMessages = onSnapshot(msgsQ, snap => {
    snap.docChanges().forEach(change => {
      if (change.type === 'added') appendMessage(change.doc.data());
    });
    messagesBox.scrollTop = messagesBox.scrollHeight;
  });

  updatePresence(currentServer, ch);
  listenPresence(currentServer, ch);
}

function appendMessage(m) {
  const isSelf = m.uid === currentUser?.uid;
  const div  = document.createElement('div');
  div.className = 'message' + (isSelf ? ' self' : '');
  const meta = document.createElement('div');
  meta.className = 'meta';
  const ts = m.ts ? new Date(m.ts.toMillis()).toLocaleTimeString() : '';
  meta.textContent = `${m.username} • ${ts}`;
  const txt = document.createElement('div');
  txt.textContent = m.text;
  div.appendChild(meta);
  div.appendChild(txt);
  messagesBox.appendChild(div);
}


// ══════════════════════════════════════════════════════════════════
//  SEND MESSAGE
// ══════════════════════════════════════════════════════════════════

async function sendMessage() {
  const text = document.getElementById('inputMsg').value.trim();
  if (!text || !currentUser) return;
  document.getElementById('inputMsg').value = '';

  if (inDM && currentDMUid) { await sendDM(text); return; }
  if (!currentServer || !currentChannel) return alert('Join a channel first.');

  await addDoc(collection(db, 'servers', currentServer, 'channels', currentChannel, 'messages'), {
    text, username: myUsername, uid: currentUser.uid, ts: serverTimestamp()
  });
}

document.getElementById('sendBtn').onclick = sendMessage;
document.getElementById('inputMsg').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});


// ══════════════════════════════════════════════════════════════════
//  PRESENCE
// ══════════════════════════════════════════════════════════════════

async function updatePresence(serverId, channelId) {
  if (!currentUser) return;
  await setDoc(doc(db, 'servers', serverId, 'presence', currentUser.uid),
    { username: myUsername, channelId, ts: serverTimestamp() });
}

async function clearPresence() {
  if (!currentUser || !currentServer) return;
  try { await deleteDoc(doc(db, 'servers', currentServer, 'presence', currentUser.uid)); } catch (_) {}
}

function listenPresence(serverId, channelId) {
  if (unsubPresence) unsubPresence();
  unsubPresence = onSnapshot(collection(db, 'servers', serverId, 'presence'), snap => {
    const users = snap.docs
      .filter(d => d.data().channelId === channelId)
      .map(d => d.data().username);
    onlineList.innerHTML = users.map(u => `<li>🟢 ${u}</li>`).join('');
  });
}

window.addEventListener('beforeunload', clearPresence);

// ── Login button wiring (must use addEventListener in module scope) ─
document.getElementById('loginBtn').addEventListener('click', login);
document.getElementById('signupBtn').addEventListener('click', signup);


// ══════════════════════════════════════════════════════════════════
//  DIRECT MESSAGES
// ══════════════════════════════════════════════════════════════════

function dmId(uid1, uid2) { return [uid1, uid2].sort().join('_'); }

async function loadDMList() {
  stopListeners();
  inDM = true;
  currentServer  = null;
  currentChannel = null;
  currentDMUid   = null;
  currentInvite  = null;

  serverHeader.textContent = 'Direct Messages';
  inviteBadge.style.display = 'none';
  chatHeader.textContent = 'DMs';
  channelList.innerHTML  = '';
  messagesBox.innerHTML  = '';
  onlineList.innerHTML   = '';
  document.getElementById('addChannelBtn').style.display = 'none';

  const newBtn = document.createElement('div');
  newBtn.className = 'channel-item';
  newBtn.style.fontWeight = 'bold';
  newBtn.textContent = '+ New DM';
  newBtn.onclick = startNewDM;
  channelList.appendChild(newBtn);

  const partnerSnap = await getDoc(doc(db, 'userDMs', currentUser.uid));
  if (partnerSnap.exists()) {
    Object.entries(partnerSnap.data()).forEach(([uid, uname]) => {
      const el = document.createElement('div');
      el.className = 'channel-item';
      el.textContent = uname;
      el.onclick = () => openDM(uid, uname);
      channelList.appendChild(el);
    });
  }

  loadMyServers();
}

async function startNewDM() {
  const targetName = prompt('Enter the username to DM:');
  if (!targetName) return;

  const snap = await getDocs(query(collection(db, 'users'), where('username', '==', targetName.trim())));
  if (snap.empty) return alert('User "' + targetName + '" not found.');
  const targetDoc = snap.docs[0];
  const targetUid = targetDoc.data().uid;
  const targetUsername = targetDoc.data().username;

  if (targetUid === currentUser.uid) return alert("That's you!");

  await setDoc(doc(db, 'userDMs', currentUser.uid), { [targetUid]: targetUsername }, { merge: true });
  await setDoc(doc(db, 'userDMs', targetUid), { [currentUser.uid]: myUsername }, { merge: true });

  openDM(targetUid, targetUsername);
}

function openDM(uid, username) {
  stopListeners();
  inDM = true;
  currentDMUid  = uid;
  currentDMName = username;
  chatHeader.textContent = 'DM with ' + username;
  messagesBox.innerHTML = '';
  onlineList.innerHTML  = '';

  Array.from(channelList.children).forEach(el => {
    el.classList.toggle('active', el.textContent === username);
  });

  const id = dmId(currentUser.uid, uid);
  const dmQ = query(collection(db, 'dms', id, 'messages'), orderBy('ts'), limitToLast(100));
  unsubMessages = onSnapshot(dmQ, snap => {
    snap.docChanges().forEach(change => {
      if (change.type === 'added') appendDM(change.doc.data());
    });
    messagesBox.scrollTop = messagesBox.scrollHeight;
  });
}

async function sendDM(text) {
  const id = dmId(currentUser.uid, currentDMUid);
  await addDoc(collection(db, 'dms', id, 'messages'), {
    from: myUsername, fromUid: currentUser.uid,
    to: currentDMName, toUid: currentDMUid,
    text, ts: serverTimestamp()
  });
  await setDoc(doc(db, 'userDMs', currentUser.uid), { [currentDMUid]: currentDMName }, { merge: true });
  await setDoc(doc(db, 'userDMs', currentDMUid), { [currentUser.uid]: myUsername }, { merge: true });
}

function appendDM(m) {
  const isSelf = m.fromUid === currentUser?.uid;
  const div  = document.createElement('div');
  div.className = 'message' + (isSelf ? ' self' : '');
  const meta = document.createElement('div');
  meta.className = 'meta';
  const ts = m.ts ? new Date(m.ts.toMillis()).toLocaleTimeString() : '';
  meta.textContent = `${m.from} • ${ts}`;
  const txt = document.createElement('div');
  txt.textContent = m.text;
  div.appendChild(meta);
  div.appendChild(txt);
  messagesBox.appendChild(div);
}
</script>
